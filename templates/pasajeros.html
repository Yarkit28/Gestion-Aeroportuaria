{% extends "base.html" %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h1><i class="fas fa-users"></i> Lista de Pasajeros</h1>
    <a href="{{ url_for('nuevo_pasajero') }}" class="btn btn-success">
        <i class="fas fa-user-plus"></i> Nuevo Pasajero
    </a>
</div>


<div class="table-responsive">
    <table class="table table-striped table-hover">
        <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Edad</th>
                <th>Tipo</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody>
            {% for pasajero in pasajeros %}
            <tr>
                <td>{{ pasajero.id_pasajero }}</td>
                <td>{{ pasajero.nombre }}</td>
                <td>{{ pasajero.edad }}</td>
                <td>
                    <span class="badge 
                        {% if pasajero.tipo_pasajero == 'Niño' %}bg-info
                        {% elif pasajero.tipo_pasajero == 'Adulto' %}bg-success
                        {% else %}bg-warning text-dark{% endif %}">
                        {{ pasajero.tipo_pasajero }}
                    </span>
                </td>
                <td>
                    <form action="{{ url_for('eliminar_pasajero_completo', id=pasajero.id_pasajero) }}" method="POST" 
                          class="d-inline" onsubmit="return confirm('¿Estás seguro de que quieres eliminar a {{ pasajero.nombre }}?');">
                        <button type="submit" class="btn btn-danger btn-sm">
                            <i class="fas fa-trash"></i> Eliminar
                        </button>
                    </form>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
